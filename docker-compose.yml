services:
  store:
    build:
      context: .
      args:
        # Optional: activate Fastly Bot Management embedded challenges by setting
        # the challenge script filename you chose (the prefix is built in). Baked
        # in at build time. A full-path override is also supported.
        VITE_FASTLY_CHALLENGE_FILE: "${VITE_FASTLY_CHALLENGE_FILE:-}"
        VITE_FASTLY_CHALLENGE_PATH: "${VITE_FASTLY_CHALLENGE_PATH:-}"
    container_name: parc-ferme-store
    ports:
      - "4000:4000"
    environment:
      # Override for your environment as needed.
      JWT_SECRET: change-me-for-your-demo
      RATE_LIMIT_GENERAL: "300"
      RATE_LIMIT_AUTH: "20"
      RATE_LIMIT_NEWSLETTER: "10"
    volumes:
      # Persist the SQLite database between restarts. Remove the volume
      # (docker compose down -v) to reset to fresh seed data.
      - store-data:/app/server/data
    restart: unless-stopped

volumes:
  store-data:

services:
  store:
    build:
      context: .
      args:
        # Optional: activate Fastly Bot Management embedded challenges by setting
        # the challenge script filename you chose (the prefix is built in). Baked
        # in at build time. A full-path override is also supported.
        VITE_FASTLY_CHALLENGE_FILE: "${VITE_FASTLY_CHALLENGE_FILE:-}"
        VITE_FASTLY_CHALLENGE_PATH: "${VITE_FASTLY_CHALLENGE_PATH:-}"
        # Kill switch — set VITE_FASTLY_CHALLENGE_DISABLED=true to fully disable.
        VITE_FASTLY_CHALLENGE_DISABLED: "${VITE_FASTLY_CHALLENGE_DISABLED:-}"
    container_name: parc-ferme-store
    ports:
      - "4000:4000"
    environment:
      # REQUIRED: a unique, high-entropy secret (min 32 chars). Generate one with
      # `openssl rand -hex 32` and export it (or put it in a .env file) before
      # `docker compose up`. The API refuses to start in production without it,
      # and `compose up` errors here if it is unset.
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET to a strong random value, e.g. openssl rand -hex 32}"
      # Optional: choose the seeded admin password. If unset, a random one is
      # generated and printed once in the container logs on first seed.
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # Optional: enable the reset-token test affordance for a throwaway domain so
      # bulk scripts can generate password-reset-success signals (see README).
      RESET_TEST_DOMAIN: "${RESET_TEST_DOMAIN:-}"
    volumes:
      # Persist the SQLite database between restarts. Remove the volume
      # (docker compose down -v) to reset to fresh seed data.
      - store-data:/app/server/data
    restart: unless-stopped

volumes:
  store-data:
